<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Helper Extension</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="popup-container">
        <h1 class="title">Page Actions</h1>
        <div class="button-container">
            <button id="summarize" class="action-button">
                <span class="button-text">Summarize this entire page</span>
            </button>
            <button id="translate" class="action-button">
                <span class="button-text">Translate the entire page</span>
            </button>
            <button id="rewrite" class="action-button">
                <span class="button-text">Rewrite with saved bookmarks</span>
            </button>
        </div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
